# .github/workflows/deploy.yml
#
# CS178 Auto-Deploy Workflow
# --------------------------
# Automatically deploys your Flask app to EC2 whenever you push to main.
#
# Before this works, you must add three secrets to your GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#
#   EC2_HOST        → Your EC2 Public IPv4 DNS
#                     (looks like ec2-XX-XX-XX-XX.compute-1.amazonaws.com)
#   EC2_USER        → ec2-user
#   EC2_PRIVATE_KEY → The contents of your deploy_key (from Lab 9 setup)
#
# If you're starting fresh (new fork), re-do the deploy key setup from Lab 9.

name: Deploy to EC2

on:
  push:
    branches:
      - main # runs every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: SSH into EC2 and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Navigate to the project folder
            # If this is your first deploy, clone your repo first:
            #   git clone https://github.com/YOUR-USERNAME/cs178-flask-app.git ~/cs178-flask-app
            cd ~/cs178-flask-app

            # Pull the latest code from GitHub
            git pull origin main

            # Stop the currently running Flask app (if any)
            # pkill looks for a process matching 'flaskapp.py' and kills it
            pkill -f "python3 flaskapp.py" || true   # '|| true' prevents failure if nothing is running

            # Wait a moment to make sure the port is released
            sleep 2

            # Restart Flask in the background
            # nohup keeps it running after the SSH session closes
            # Output is logged to flask.log for debugging
            nohup python3 flaskapp.py > flask.log 2>&1 &

            echo "✅ Deploy complete. Flask restarted."
